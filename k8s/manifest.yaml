apiVersion: apps/v1
kind: Deployment
metadata:
  name: skirmshop-picker
  namespace: skirmshop
spec:
  replicas: 1
  selector: { matchLabels: { app: skirmshop-picker } }
  template:
    metadata: { labels: { app: skirmshop-picker } }
    spec:
      enableServiceLinks: false
      nodeSelector: { topology: lan, kubernetes.io/arch: amd64 }
      containers:
        - name: picker
          image: harbor.e-dani.com/homelab/skirmshop-picker:latest
          ports: [{ name: http, containerPort: 3480 }]
          env:
            - { name: DATABASE_URL, value: "postgresql://$(DB_USER):$(DB_PASSWORD)@shared-postgres-rw.skirmshop.svc.cluster.local:5432/skirmshop" }
          envFrom: [{ secretRef: { name: labels-secrets } }]
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { memory: 512Mi }
          readinessProbe:
            httpGet: { path: /health, port: 3480 }
            initialDelaySeconds: 15
---
---
apiVersion: v1
kind: Service
metadata: { name: skirmshop-picker, namespace: skirmshop }
spec:
  selector: { app: skirmshop-picker }
  ports: [{ name: http, port: 80, targetPort: 3480 }]
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-picker
  namespace: skirmshop
spec:
  stripPrefix:
    prefixes:
      - /picker
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: skirmshop-picker-public
  namespace: skirmshop
  annotations:
    external-dns.alpha.kubernetes.io/hostname: skirmshop.e-dani.com
    external-dns.alpha.kubernetes.io/target: "57.129.17.172"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  entryPoints: [websecure]
  ingressClassName: traefik-edge
  routes:
    - match: Host(`skirmshop.e-dani.com`) && PathPrefix(`/picker`)
      kind: Rule
      middlewares:
        - name: strip-picker
      services:
        - name: skirmshop-picker
          port: 80
  tls: {}

