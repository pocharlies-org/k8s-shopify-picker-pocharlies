apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: skirmshop

# Internal admin tool (not Shopify-embedded): bespoke routing + Authelia SSO.
# Uses explicit names (no namePrefix) because routing is hand-written.
resources:
  - https://github.com/pocharlies/k8s-shopify-framework-pocharlies.git//base?ref=deploy/prod
  - routing.yaml
  - cronjobs.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/instance: picker

images:
  - name: shopify-app
    newName: harbor.e-dani.com/homelab/skirmshop-picker
    newTag: latest

patches:
  - target: { kind: Deployment, name: app }
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: app
      spec:
        template:
          spec:
            containers:
              - name: app
                env:
                  - { name: PORT, value: "3480" }
                envFrom:
                  - secretRef: { name: picker-secrets }
  - target: { group: apps, version: v1, kind: Deployment, name: app }
    patch: |-
      - op: replace
        path: /metadata/name
        value: skirmshop-picker
      - op: replace
        path: /spec/template/spec/containers/0/ports/0/containerPort
        value: 3480
  - target: { version: v1, kind: Service, name: app }
    patch: |-
      - op: replace
        path: /metadata/name
        value: skirmshop-picker
  - target: { group: traefik.io, version: v1alpha1, kind: IngressRoute, name: app }
    patch: |-
      $patch: delete
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: app
